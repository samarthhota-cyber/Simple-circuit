<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="wight=device-width, inital-scale=1.0">
        <title>Simple circuits</title>
        <link rel="stylesheet" href="style.css"> 
    </head>
    <body>
        <div id="app-container">
            <!-- Side toolbar-->
             <div id="toolbar">
                <h2>Components</h2>
                <button class="tool-btn" data-type="AND">AND Gate</button>
                <button class="tool-btn" data-type="OR">OR Gate</button>
                <button class="tool-btn" data-type="NOT">NOT Gate</button>
                <button class="tool-btn" data-type="Wire">Draw Wire</button>
             </div>

             <!-- Workspace-main-->
             <div id="workspace">
                <canvas id="circuitCanvas"></canvas>
             </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
